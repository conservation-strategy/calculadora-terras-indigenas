<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<title>Calculadora de Custos de Gestão de Terras Indígenas</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		*,
		*:before,
		*:after {
			margin: 0px;
			padding: 0px;
			-webkit-box-sizing: border-box;
			-moz-box-sizing: border-box;
			box-sizing: border-box;
		}

		body,
		html {
			font-family: Arial, sans-serif;
			font-size: 15px;
			color: #666666;
			height: 100%;
			background-color: #fff;
			-webkit-box-sizing: border-box;
			-moz-box-sizing: border-box;
			box-sizing: border-box;
		}

		.container {
			flex-direction: column;
			justify-content: space-between;
			align-items: center;
			display: flex;
			padding-top: 35px;
			padding-bottom: 35px;
			padding-right: 15px;
			padding-left: 15px;
			width: 100%;
			min-height: 100vh;
			background: linear-gradient(-45deg, #ac32e4, #7918f2, #4801ff);
		}

		.main {
			display: flex;
			flex-direction: column;
			align-items: center;
			padding-bottom: 50px;
			padding-top: 50px;
		}

		h3 {
			padding-bottom: 10px;
			text-align: center;
			font-size: 50px;
			color: #fff;
			line-height: 1.2;
			text-transform: uppercase;
		}

		p {
			padding-bottom: 60px;
			font-size: 30px;
			color: #fff;
			line-height: 1.2;
			text-align: center;
		}

		.footer {
			font-size: 12px;
			color: #cccccc;
			line-height: 1.4;
			text-align: center;
		}
	</style>
</head>

<body>
	<div class="container">
		<span></span>
		<div class="main">
			<h3> Em Breve </h3>
			<p> Calculadora de Custos de Gestão de Terras Indígenas (TIs) </p>
		</div>
		<div class="footer"> © 2024 Copyright: CSF All rights reserved. </div>
	</div>
</body>

</html>
